<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 100px;
            height: 100px;
        }
        .div1{
            background-color: blue;
        }
        .div2{
            background-color: red;
            position: relative;
            left: 50px;
            top: -50px;
            z-index: 3;
        }
        .div3{
            background-color: green;
            position: relative;
            left: 100px;
            top: -100px;
            z-index: 2;
        }
        .div4{
            background-color: yellow;
            position: relative;
            left: 150px;
            top: -150px;
        }
    </style>
</head>
<body>
    <div class="div1"></div>
    <div class="div2"></div>
    <div class="div3"></div>
    <div class="div4"></div>
</body>
</html>
